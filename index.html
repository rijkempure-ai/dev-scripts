<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .header { text-align: center; font-size: 24px; color: #00ffcc; margin-bottom: 20px; }
        #search { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; margin-bottom: 20px; box-sizing: border-box; }
        .card { background: #111; border-radius: 10px; margin-bottom: 15px; padding: 15px; border: 1px solid #333; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .btn { background: #00ffcc; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <div class="header">⚡ DEV SCRIPTS</div>
    <input type="text" id="search" placeholder="🔍 Search games..." onkeyup="filter()">
    <div id="container"></div>

    <script>
        const scripts = [
            { name: "Blox Fruit", img: "https://tr.rbxcdn.com/f02e606a550d4f3b7d727b3b3a620610/512/512/Image/Png", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/hermanos-dev/hermanos-hub/refs/heads/main/Loader.lua'))()" },
            { name: "Murder Mystery 2", img: "https://tr.rbxcdn.com/7b165b6b8b0e5d0a1b8c1a1f1e1d1c1a/512/512/Image/Png", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/xv3gasx/Murder-Mystery-2/refs/heads/main/Release.lua'))()" },
            { name: "Jailbreak", img: "https://tr.rbxcdn.com/f9b4c09d066b1897d266e7b1a646c039/512/512/Image/Png", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/BlitzlsKing/UniversalFarm/refs/heads/main/Jailbreak/autoRob'))()" },
            { name: "Phantom Forces", img: "https://tr.rbxcdn.com/15291244243685324203133644023412/512/512/Image/Png", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/jsdhaijs/autofatrm/refs/heads/main/pflite'))()" },
            { name: "Rivals", img: "https://tr.rbxcdn.com/00e84d9f67a224d0818c644144365780/512/512/Image/Png", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/awakeningswifters/LexusHubLoader/refs/heads/main/Loader.lua'))()" }
        ];

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = "";
            scripts.forEach(s => {
                container.innerHTML += `<div class="card">
                    <img src="${s.img}" alt="${s.name}">
                    <h3>${s.name}</h3>
                    <button class="btn" onclick="copy('${s.url}')">COPY SCRIPT</button>
                </div>`;
            });
        }

        function copy(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied!');
            }).catch(() => {
                const area = document.createElement("textarea");
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand("copy");
                document.body.removeChild(area);
                alert('Copied manually!');
            });
        }

        function filter() {
            const input = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(input) ? "" : "none";
            });
        }
        render();
    </script>
</body>
</html>
