<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; }
        .header { text-align: center; color: #00ffcc; font-size: 24px; margin-bottom: 20px; }
        .card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .btn { background: #00ffcc; padding: 10px; width: 100%; border: none; border-radius: 5px; font-weight: bold; color: #000; }
    </style>
</head>
<body>
    <div class="header">DEV SCRIPTS</div>
    <div id="container"></div>
    <script>
        const scripts = [
            { name: "Blox Fruit", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/hermanos-dev/hermanos-hub/refs/heads/main/Loader.lua'))()" },
            { name: "Murder Mystery 2", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/xv3gasx/Murder-Mystery-2/refs/heads/main/Release.lua'))()" },
            { name: "Jailbreak", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/BlitzlsKing/UniversalFarm/refs/heads/main/Jailbreak/autoRob'))()" },
            { name: "Phantom Forces", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/jsdhaijs/autofatrm/refs/heads/main/pflite'))()" },
            { name: "Rivals", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/awakeningswifters/LexusHubLoader/refs/heads/main/Loader.lua'))()" }
        ];
        scripts.forEach(s => {
            document.getElementById('container').innerHTML += `<div class="card"><h3>${s.name}</h3><button class="btn" onclick="navigator.clipboard.writeText('${s.url}'); alert('Copied!');">COPY SCRIPT</button></div>`;
        });
    </script>
</body>
</html>
