<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .header { text-align: center; font-size: 24px; color: #00ffcc; margin-bottom: 20px; }
        #search { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; margin-bottom: 20px; box-sizing: border-box; }
        .card { background: #111; border-radius: 10px; margin-bottom: 15px; padding: 15px; border: 1px solid #333; display: flex; align-items: center; }
        .card img { width: 50px; height: 50px; border-radius: 5px; margin-right: 15px; object-fit: cover; background: #222; }
        .info { flex-grow: 1; }
        .btn { background: #00ffcc; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; display: block; margin-top: 8px; width: 100%; }
    </style>
</head>
<body>
    <div class="header">⚡ DEV-SCRIPTS</div>
    <input type="text" id="search" placeholder="🔍 Search games..." onkeyup="filter()">
    <div id="container"></div>

    <script>
        const scripts = [
            { name: "99 Nights in the Forest", url: "loadstring(game:HttpGet('https://pastebin.com/raw/LPbPPNpC'))()" },
            { name: "Blox Fruit (Pvp)", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/hermanos-dev/hermanos-hub/refs/heads/main/Loader.lua'))()" },
            { name: "Squid X Game 3", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/madenciicom/squidgamex/refs/heads/main/SquidGameX_KaiXar.lua'))()" },
            { name: "1+ Speed Keyboard Escape", url: "loadstring(game:HttpGet('https://www.luxyhub.space/api/loader/luxyhub'))()" },
            { name: "Elemental Dungeons", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/xpa1n/Scripts/main/ElementalDungeons.lua'))()" },
            { name: "Blox Fruits (Grinding)", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/flazhy/QuantumOnyx/refs/heads/main/QuantumOnyx.lua'))()" },
            { name: "Rivals", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/awakeningswifters/LexusHubLoader/refs/heads/main/Loader.lua'))()" },
            { name: "Slime Rng", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/zenirh/BestScriptsHub/refs/heads/main/HubMenu.lua'))()" },
            { name: "Sell Lemons", url: "loadstring(game:HttpGet('https://pastefy.app/YjVlc4pj/raw'))()" },
            { name: "Steal a Brainrot (Freeze Trade)", url: "loadstring(game:HttpGet('https://voidexternal.xyz/api/cnh1ahnm.lua'))()" },
            { name: "Tha Bronx Duels", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/sneekygoober/The-Bronx-Duels-Silent-Aim-And-Anti-Jam-Keyless-Script/refs/heads/main/main.luau'))()" },
            { name: "Jailbreak", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/BlitzlsKing/UniversalFarm/refs/heads/main/Jailbreak/autoRob'))()" },
            { name: "Monkey Bomb Tag", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/gumanba/Scripts/main/MonkeyBombTag'))()" },
            { name: "Sailor Piece", url: "loadstring(game:HttpGet('https://api.luarmor.net/files/v3/loaders/d8824b23a4d9f2e0d62b4e69397d206b.lua'))()" },
            { name: "Attack on Titan", url: "loadstring(game:HttpGet('https://pastebin.com/raw/qcucSQdE'))()" },
            { name: "Aimbot (All Games)", url: "loadstring(game:HttpGet('https://tvon.pages.dev/lua/AimBot.lua'))()" },
            { name: "Survive The Apocalypse", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/xploitforceofficial-stack/pinatpublicloader/refs/heads/main/pinatloader.lua'))()" },
            { name: "Garden Horizon", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/LynX99-9/komtolmmek2/refs/heads/main/Garden%20Horizon'))()" },
            { name: "Murder Mystery 2", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/xv3gasx/Murder-Mystery-2/refs/heads/main/Release.lua'))()" },
            { name: "Blox Fruits", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/AhmadV99/Speed-Hub-X/main/Speed%20Hub%20X.lua',true))()" },
            { name: "Mad City", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/xHeptc/Kavo-UI-Library/main/source.lua'))()" },
            { name: "Grow a Garden", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/ZusumeHub/ZusumeHub/refs/heads/main/UpdateZysume'))()" },
            { name: "Phantom Forces", url: "loadstring(game:HttpGet('https://raw.githubusercontent.com/jsdhaijs/autofatrm/refs/heads/main/pflite'))()" },
            { name: "Garden Horizon (Alt)", url: "loadstring(game:HttpGet('https://vxezestudio.online/api/scripts/script_gb12wihwnml/plain'))()" }
        ];

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = "";
            scripts.forEach(s => {
                container.innerHTML += `<div class="card">
                    <img src="https://www.roblox.com/favicon.ico" alt="Icon">
                    <div class="info">
                        <strong>${s.name}</strong>
                        <button class="btn" onclick="copy('${s.url.replace(/'/g, "\\'")}')">COPY SCRIPT</button>
                    </div>
                </div>`;
            });
        }

        function copy(text) {
            navigator.clipboard.writeText(text).then(() => alert('Copied!')).catch(() => alert('Failed to copy.'));
        }

        function filter() {
            const input = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(input) ? "" : "none";
            });
        }
        render();
    </script>
</body>
</html>
